<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loan Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    header { background: #1a1a2e; color: white; padding: 20px; text-align: center; font-size: 24px; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .form-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-box h2 { margin-bottom: 15px; color: #1a1a2e; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-add { background: #1a1a2e; color: white; width: 100%; margin-top: 10px; padding: 12px; }
    .btn-pay { background: #007bff; color: white; }
    .btn-paid { background: #28a745; color: white; }
    .btn-remind { background: #ff6b35; color: white; }
    .btn-delete { background: #dc3545; color: white; }
    .btn-remindall { background: #ff6b35; color: white; width: 100%; padding: 14px; margin-bottom: 20px; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 14px; }
    th { background: #1a1a2e; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .badge-paid { background: #28a745; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .badge-pending { background: #ffc107; color: #333; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .badge-overdue { background: #dc3545; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .remaining { color: #dc3545; font-weight: bold; }
    .paid-amt { color: #28a745; font-weight: bold; }
  </style>
</head>
<body>
  <header>Loan Payment Tracker</header>
  <div class="container">
    <div class="form-box">
      <h2>Add New Borrower</h2>
      <input id="name" placeholder="Full Name" />
      <input id="phone" placeholder="Phone Number (e.g. +919876543210)" />
      <input id="whatsapp" placeholder="WhatsApp Number (e.g. +919876543210)" />
      <input id="amount" placeholder="Loan Amount (Rs)" type="number" />
      <input id="due_date" type="date" />
      <button class="btn btn-add" id="addBtn">Add Borrower</button>
    </div>

    <button class="btn btn-remindall" id="remindAllBtn">Send Reminder to All Overdue</button>

    <table>
      <thead>
        <tr>
          <th>Name</th><th>Phone</th><th>Total</th><th>Paid</th><th>Remaining</th><th>Due Date</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    var API = 'https://lone-tracker-production.up.railway.app';

    function loadBorrowers() {
      fetch(API + '/borrowers')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var today = new Date().toISOString().split('T')[0];
          var tbody = document.getElementById('tableBody');
          tbody.innerHTML = '';
          data.forEach(function (b) {
            var remaining = b.loan_amount - b.amount_paid;
            var isOverdue = b.status === 'pending' && b.due_date < today;
            var statusBadge = '';
            if (b.status === 'paid') {
              statusBadge = '<span class="badge-paid">Paid</span>';
            } else if (isOverdue) {
              statusBadge = '<span class="badge-overdue">Overdue</span>';
            } else {
              statusBadge = '<span class="badge-pending">Pending</span>';
            }

            var actionsHtml = '';
            if (b.status !== 'paid') {
              actionsHtml += '<button class="btn btn-pay" onclick="addPayment(' + b.id + ')">Add Payment</button> ';
              actionsHtml += '<button class="btn btn-remind" onclick="sendRemind(' + b.id + ')">Send Alert</button> ';
            }
            actionsHtml += '<button class="btn btn-delete" onclick="deleteBorrower(' + b.id + ')">Delete</button>';

            var row = '<tr>' +
              '<td>' + b.name + '</td>' +
              '<td>' + b.phone + '</td>' +
              '<td>Rs.' + b.loan_amount + '</td>' +
              '<td class="paid-amt">Rs.' + b.amount_paid + '</td>' +
              '<td class="remaining">Rs.' + remaining + '</td>' +
              '<td>' + b.due_date + '</td>' +
              '<td>' + statusBadge + '</td>' +
              '<td>' + actionsHtml + '</td>' +
              '</tr>';
            tbody.innerHTML += row;
          });
        })
        .catch(function (err) {
          console.log('Error loading borrowers:', err);
        });
    }

    function addBorrower() {
      var body = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        whatsapp: document.getElementById('whatsapp').value,
        loan_amount: document.getElementById('amount').value,
        due_date: document.getElementById('due_date').value
      };
      fetch(API + '/borrowers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
        .then(function () { loadBorrowers(); })
        .catch(function (err) { console.log('Error adding borrower:', err); });
    }

    function addPayment(id) {
      var amount = prompt('Enter the payment amount received (Rs):');
      if (amount === null || amount === '' || isNaN(amount)) {
        return;
      }
      fetch(API + '/borrowers/' + id + '/payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: amount })
      })
        .then(function () { loadBorrowers(); })
        .catch(function (err) { console.log('Error recording payment:', err); });
    }

    function sendRemind(id) {
      fetch(API + '/borrowers/' + id + '/remind', { method: 'POST' })
        .then(function () { alert('Reminder sent!'); });
    }

    function deleteBorrower(id) {
      if (confirm('Delete this borrower?')) {
        fetch(API + '/borrowers/' + id, { method: 'DELETE' })
          .then(function () { loadBorrowers(); });
      }
    }

    document.getElementById('addBtn').addEventListener('click', addBorrower);
    document.getElementById('remindAllBtn').addEventListener('click', function () {
      fetch(API + '/borrowers/remind-all', { method: 'POST' })
        .then(function (res) { return res.json(); })
        .then(function (data) { alert(data.message); })
        .catch(function (err) {
          alert('Failed to send reminders');
          console.log(err);
        });
    });

    loadBorrowers();
  </script>
</body>
</html>
